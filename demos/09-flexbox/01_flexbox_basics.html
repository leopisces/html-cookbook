<!--
  title: Flexbox 基础
  description: 弹性盒布局：主轴、交叉轴、对齐、换行
  goals: display:flex; justify-content; align-items; flex-direction; flex-wrap
  tags: flexbox, layout
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Flexbox 基础</title>
  <style>
    body { font-family: sans-serif; max-width: 700px; margin: 2rem auto; padding: 1rem; }
    .flex-demo { display: flex; background: #f1f5f9; padding: 1rem; border-radius: 8px; margin-bottom: 1rem; gap: 0.5rem; }
    .flex-demo .item { background: #059669; color: white; padding: 0.5rem 1rem; border-radius: 4px; text-align: center; }
  </style>
</head>
<body>
  <h1>Flexbox 基础</h1>
  <h2>水平排列</h2>
  <div class="flex-demo" style="justify-content: space-around;">
    <div class="item">项目1</div>
    <div class="item">项目2</div>
    <div class="item">项目3</div>
  </div>
  <p><code>justify-content: space-around</code> — 等间距分布</p>
  <h2>垂直居中</h2>
  <div class="flex-demo" style="align-items: center; height: 100px;">
    <div class="item">居中</div>
    <div class="item" style="padding: 1.5rem;">较大项目</div>
    <div class="item">居中</div>
  </div>
  <p><code>align-items: center</code> — 交叉轴居中</p>
  <h2>换行</h2>
  <div class="flex-demo" style="flex-wrap: wrap;">
    <div class="item" style="width: 150px;">宽项目1</div>
    <div class="item" style="width: 150px;">宽项目2</div>
    <div class="item" style="width: 150px;">宽项目3</div>
    <div class="item" style="width: 150px;">宽项目4</div>
  </div>
  <p><code>flex-wrap: wrap</code> — 超出宽度时换行</p>
</body>
</html>
