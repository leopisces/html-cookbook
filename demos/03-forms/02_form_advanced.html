<!--
  title: 表单进阶：多种输入与验证
  description: HTML表单高级输入类型、选择控件、内置验证
  goals: radio与checkbox单选多选; select下拉选择与多选; textarea多行文本; range/date/color等新类型; required/pattern/min/max内置验证; fieldset与legend分组
  tags: forms, input, validation
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>表单进阶：多种输入与验证</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 2rem auto; padding: 1rem; }
    form { background: #f1f5f9; padding: 1.5rem; border-radius: 8px; }
    fieldset { border: 1px solid #cbd5e1; border-radius: 6px; margin-bottom: 1rem; padding: 0.8rem 1rem; }
    legend { font-weight: bold; color: #059669; }
    label { display: block; margin-bottom: 0.3rem; font-weight: bold; font-size: 0.9rem; }
    .inline { display: inline; font-weight: normal; margin-right: 0.6rem; }
    input, select, textarea { padding: 0.4rem; border: 1px solid #cbd5e1; border-radius: 4px; font-size: 0.9rem; }
    input[type="text"], input[type="email"], input[type="url"],
    input[type="search"], input[type="tel"], select { width: 100%; margin-bottom: 0.5rem; box-sizing: border-box; }
    .row { margin-bottom: 0.6rem; display: flex; flex-wrap: wrap; align-items: center; gap: 0.5rem; }
    textarea { width: 100%; margin-bottom: 0.5rem; box-sizing: border-box; }
    button { background: #059669; color: white; padding: 0.6rem 1.5rem; border: none; border-radius: 4px; cursor: pointer; font-size: 0.95rem; }
    output { font-weight: bold; color: #059669; }
    .hint { font-size: 0.8rem; color: #64748b; }
  </style>
</head>
<body>
  <h1>表单进阶：多种输入与验证</h1>

  <form onsubmit="event.preventDefault(); alert('验证通过！');">

    <fieldset>
      <legend>单选 (radio) 与多选 (checkbox)</legend>
      <div class="row">
        <label>性别：</label>
        <label class="inline"><input type="radio" name="gender" value="male" checked> 男</label>
        <label class="inline"><input type="radio" name="gender" value="female"> 女</label>
      </div>
      <div class="row">
        <label>兴趣：</label>
        <label class="inline"><input type="checkbox" name="hobby" value="read"> 阅读</label>
        <label class="inline"><input type="checkbox" name="hobby" value="sport"> 运动</label>
        <label class="inline"><input type="checkbox" name="hobby" value="music"> 音乐</label>
      </div>
    </fieldset>

    <fieldset>
      <legend>下拉选择 (select) 与 optgroup 分组</legend>
      <label for="city">城市：</label>
      <select id="city">
        <optgroup label="华北地区">
          <option value="bj">北京</option>
          <option value="tj">天津</option>
        </optgroup>
        <optgroup label="华东地区">
          <option value="sh">上海</option>
          <option value="hz">杭州</option>
        </optgroup>
      </select>
      <label for="skills">技能（多选：按住 Ctrl 点击）：</label>
      <select id="skills" multiple size="3">
        <option value="html">HTML</option>
        <option value="css">CSS</option>
        <option value="js">JavaScript</option>
        <option value="ts">TypeScript</option>
      </select>
    </fieldset>

    <fieldset>
      <legend>新型输入类型</legend>
      <label for="bio">个人简介 (textarea)：</label>
      <textarea id="bio" rows="3" maxlength="200" placeholder="最多200字..."></textarea>
      <div class="row">
        <label class="inline">评分：<input type="range" min="0" max="100" value="80" id="score" oninput="scoreVal.textContent=this.value"></label>
        <output id="scoreVal" for="score">80</output>
      </div>
      <div class="row">
        <label class="inline">日期：<input type="date"></label>
        <label class="inline">颜色：<input type="color" value="#059669"></label>
        <label class="inline">数量：<input type="number" min="1" max="10" value="1" style="width:70px;"></label>
      </div>
    </fieldset>

    <fieldset>
      <legend>验证与输入建议</legend>
      <label for="email">邮箱（必填，自动格式验证）：</label>
      <input type="email" id="email" required placeholder="user@example.com">
      <label for="phone">手机号（正则验证 pattern）：</label>
      <input type="tel" id="phone" pattern="1[3-9]\d{9}" placeholder="1 开头 11 位数字" title="请输入有效的手机号码">
      <label for="site">个人网站 (url 类型)：</label>
      <input type="url" id="site" placeholder="https://example.com">
      <label for="kw">搜索（datalist 输入建议）：</label>
      <input type="search" id="kw" list="hints" placeholder="输入关键词...">
      <datalist id="hints">
        <option value="HTML 表单">
        <option value="HTML 表格">
        <option value="CSS 布局">
        <option value="JavaScript 基础">
      </datalist>
    </fieldset>

    <fieldset>
      <legend>禁用 (disabled) 与只读 (readonly)</legend>
      <label>禁用：<input type="text" value="不可编辑" disabled style="width:100%;"></label>
      <label>只读：<input type="text" value="可选中但不可修改" readonly style="width:100%;"></label>
    </fieldset>

    <button type="submit">提交表单</button>
    <span class="hint">（提交时会触发浏览器内置验证）</span>
  </form>
</body>
</html>
