<!--
  title: HTML 表单基础
  description: 表单元素：input、select、textarea、按钮
  goals: input类型; select下拉; textarea多行; 表单提交
  tags: forms, input
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>HTML 表单基础</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 2rem auto; padding: 1rem; }
    form { background: #f1f5f9; padding: 1.5rem; border-radius: 8px; }
    label { display: block; margin-bottom: 0.3rem; font-weight: bold; }
    input, select, textarea { width: 100%; padding: 0.5rem; margin-bottom: 1rem; border: 1px solid #cbd5e1; border-radius: 4px; }
    button { background: #059669; color: white; padding: 0.7rem 1.5rem; border: none; border-radius: 4px; cursor: pointer; }
  </style>
</head>
<body>
  <h1>HTML 表单基础</h1>
  <form onsubmit="event.preventDefault(); alert('表单已提交！');">
    <label for="name">姓名：</label>
    <input type="text" id="name" placeholder="请输入姓名" required />
    <label for="email">邮箱：</label>
    <input type="email" id="email" placeholder="example@mail.com" />
    <label for="age">年龄：</label>
    <input type="number" id="age" min="1" max="120" value="25" />
    <label for="city">城市：</label>
    <select id="city">
      <option value="bj">北京</option>
      <option value="sh">上海</option>
      <option value="gz">广州</option>
    </select>
    <label for="msg">留言：</label>
    <textarea id="msg" rows="4" placeholder="写下你的想法..."></textarea>
    <button type="submit">提交</button>
  </form>
</body>
</html>
