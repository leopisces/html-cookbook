  tags: media, img
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>HTML 图片与嵌入</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 2rem auto; padding: 1rem; }
    img { max-width: 100%; border-radius: 8px; }
    .demo-box { background: #f1f5f9; padding: 1rem; margin-bottom: 1rem; border-radius: 6px; }
  </style>
</head>
<body>
  <h1>HTML 图片与嵌入</h1>
  <h2>图片 (img)</h2>
  <div class="demo-box">
    <img src="https://picsum.photos/400/200" alt="随机示例图片" width="400" height="200" />
    <p><code>src</code> — 图片地址, <code>alt</code> — 替代文字</p>
  </div>
  <h2>响应式图片</h2>
  <div class="demo-box">
    <p>设置 <code>max-width: 100%</code> 让图片自适应容器宽度。</p>
  </div>
  <h2>iframe 嵌入</h2>
  <div class="demo-box">
    <iframe src="https://example.com" width="100%" height="200" sandbox="allow-scripts" title="嵌入示例">
      iframe 不支持时显示
    </iframe>
  </div>
</body>
</html>
