<!--
  title: HTML 列表
  description: 有序、无序、定义列表及嵌套列表
  goals: ul无序列表; ol有序列表; dl定义列表; 嵌套列表
  tags: list, ul, ol
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>HTML 列表</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 2rem auto; padding: 1rem; }
    ul, ol, dl { margin-bottom: 1.5rem; }
  </style>
</head>
<body>
  <h1>HTML 列表</h1>
  <h2>无序列表 (ul)</h2>
  <ul>
    <li>苹果</li>
    <li>香蕉</li>
    <li>橘子</li>
  </ul>
  <h2>有序列表 (ol)</h2>
  <ol>
    <li>第一步：准备工作</li>
    <li>第二步：编写代码</li>
    <li>第三步：测试运行</li>
  </ol>
  <h2>定义列表 (dl)</h2>
  <dl>
    <dt>HTML</dt>
    <dd>超文本标记语言，用于构建网页</dd>
    <dt>CSS</dt>
    <dd>层叠样式表，用于美化网页</dd>
  </dl>
  <h2>嵌套列表</h2>
  <ul>
    <li>水果
      <ul>
        <li>苹果</li>
        <li>香蕉</li>
      </ul>
    </li>
    <li>蔬菜
      <ul>
        <li>西红柿</li>
        <li>黄瓜</li>
      </ul>
    </li>
  </ul>
</body>
</html>
