<!--
  title: Hello World - 第一个HTML页面
  description: HTML入门：创建你的第一个网页
  goals: HTML文档基本结构; 标题和段落标签; 浏览器如何解析HTML
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Hello World</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 2rem auto; padding: 1rem; }
    h1 { color: #059669; }
  </style>
</head>
<body>
  <h1>Hello World!</h1>
  <p>这是你的第一个 HTML 页面。</p>
  <p>HTML 是构建网页的基础语言。每个网页都由 <code>&lt;html&gt;</code>、<code>&lt;head&gt;</code>、<code>&lt;body&gt;</code> 三大结构组成。</p>
  <hr>
  <h2>基本结构</h2>
  <ul>
    <li><code>&lt;!DOCTYPE html&gt;</code> — 声明文档类型</li>
    <li><code>&lt;html&gt;</code> — 根元素</li>
    <li><code>&lt;head&gt;</code> — 头部信息（标题、样式等）</li>
    <li><code>&lt;body&gt;</code> — 页面内容</li>
  </ul>
</body>
</html>
