<!--
  title: HTML 标签与属性
  description: 常用HTML标签及其属性用法
  goals: 常用标签：div、span、a、img; 属性：id、class、style; 自闭合标签
  tags: basics, attributes
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>HTML 标签与属性</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 2rem auto; padding: 1rem; }
    .highlight { background: #d1fae5; padding: 0.3em; border-radius: 4px; }
  </style>
</head>
<body>
  <h1>HTML 标签与属性</h1>
  <h2>常用标签</h2>
  <div id="container">
    <p>这是一个 <span class="highlight">div 容器</span>中的段落。</p>
    <a href="https://example.com" target="_blank">点击链接</a>
  </div>
  <h2>属性</h2>
  <p><code>id</code> — 唯一标识符</p>
  <p><code>class</code> — 样式类名（可重复）</p>
  <p><code>style</code> — 行内样式</p>
  <p><code>href</code> — 链接地址</p>
  <h2>自闭合标签</h2>
  <img src="" alt="示例图片" width="100" height="60" />
  <br/>
  <input type="text" placeholder="输入文字" />
</body>
</html>
